<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #333;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 12px 0;
      color: #1a1a1a;
    }
    .stat {
      margin: 12px 0;
    }
    .stat-label {
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }
    .stat-value {
      font-size: 20px;
      font-weight: 600;
      color: #2563eb;
    }
    .progress-bar {
      height: 8px;
      background: #e5e7eb;
      border-radius: 4px;
      margin-top: 6px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: #2563eb;
      border-radius: 4px;
      transition: width 0.3s ease;
    }
    .footer {
      font-size: 11px;
      color: #999;
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #eee;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      margin-top: 12px;
    }
    button:hover {
      background: #1d4ed8;
    }
    .no-data {
      color: #666;
      text-align: center;
      padding: 20px 0;
    }
  </style>
</head>
<body>
  <h1>Claude Usage</h1>
  <div id="content">
    <div class="no-data">Loading...</div>
  </div>
  <button id="refreshBtn">Open Usage Page</button>
  <div class="footer">
    <span id="lastUpdated">Never updated</span>
  </div>
  <script src="popup.js"></script>
</body>
</html>
